services:
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle23ai
    restart: unless-stopped
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: demo_password
    volumes:
      - ./oracle/data:/opt/oracle/oradata
      - ./oracle/models:/opt/oracle/models:ro
      - ./oracle/setup:/opt/oracle/scripts/setup:ro
    healthcheck:
      test: ["CMD", "/opt/oracle/checkDBStatus.sh"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 60s
